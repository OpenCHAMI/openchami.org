name: Hugo Deploy To S3

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
      - name: Show Hugo version
        run: npx hugo version
      - name: Verify deploy command availability
        run: npx hugo help deploy
      - name: NPM Install
        run: npm install
      - name: Build Hugo
        run: npm run build
      - name: Deploy to S3 (no CDN invalidation)
        run: npx hugo deploy --target aws-deployment --invalidateCDN=false --maxDeletes -1
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

